<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voter Registration Form</title>
    <style>
        :root {
            --primary-color: #2b6cb0;
            --primary-hover: #2c5282;
            --bg-color: #f7fafc;
            --card-bg: #ffffff;
            --text-color: #2d3748;
            --border-color: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 800px;
        }

        h2 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        p.subtitle {
            text-align: center;
            font-size: 14px;
            color: #718096;
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--primary-color);
            margin: 20px 0 10px 0;
            padding-bottom: 5px;
            border-bottom: 2px solid var(--border-color);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        label {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
        }

        input, select {
            padding: 10px 14px;
            font-size: 14px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            background-color: #fff;
        }

        input:focus, select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(43, 108, 176, 0.15);
        }

        .radio-group, .checkbox-group {
            display: flex;
            gap: 20px;
            padding-top: 8px;
        }

        .radio-label, .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            cursor: pointer;
        }

        .btn-container {
            grid-column: span 2;
            margin-top: 30px;
            text-align: center;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 40px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            width: 100%;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        /* Responsive Breakpoint */
        @media (max-width: 600px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .form-group.full-width {
                grid-column: span 1;
            }
            .btn-container {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Voter Registration Portal</h2>
        <p class="subtitle">Please fill out all 15 fields below to complete your registration.</p>
        
        <form action="Registration" method="post">
            
            <div class="section-title">Personal Details</div>
            <div class="form-grid">
                <!-- 1. First Name -->
                <div class="form-group">
                    <label for="firstName">First Name</label>
                    <input type="text" id="firstName" name="firstName" required placeholder="John">
                </div>

                <!-- 2. Last Name -->
                <div class="form-group">
                    <label for="lastName">Last Name</label>
                    <input type="text" id="lastName" name="lastName" required placeholder="Doe">
                </div>

                <!-- 3. Date of Birth -->
                <div class="form-group">
                    <label for="dob">Date of Birth</label>
                    <input type="date" id="dob" name="dob" required>
                </div>

                <!-- 4. Gender -->
                <div class="form-group">
                    <label>Gender</label>
                    <div class="radio-group">
                        <label class="radio-label"><input type="radio" name="gender" value="male" required> Male</label>
                        <label class="radio-label"><input type="radio" name="gender" value="female"> Female</label>
                        <label class="radio-label"><input type="radio" name="gender" value="other"> Other</label>
                    </div>
                </div>
            </div>

            <div class="section-title">Contact Information</div>
            <div class="form-grid">
                <!-- 5. Email Address -->
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="john.doe@example.com">
                </div>

                <!-- 6. Phone Number -->
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" required placeholder="(555) 000-0000">
                </div>
            </div>

            <div class="section-title">Address & Jurisdiction</div>
            <div class="form-grid">
                <!-- 7. Street Address -->
                <div class="form-group full-width">
                    <label for="address">Street Address</label>
                    <input type="text" id="address" name="address" required placeholder="123 Main Street, Apt 4B">
                </div>

                <!-- 8. City -->
                <div class="form-group">
                    <label for="city">City</label>
                    <input type="text" id="city" name="city" required placeholder="Metropolis">
                </div>

                <!-- 9. State/Province -->
                <div class="form-group">
                    <label for="state">State / Province</label>
                    <select id="state" name="state" required>
                        <option value="" disabled selected>Select your state</option>
                        <option value="CA">California</option>
                        <option value="NY">New York</option>
                        <option value="TX">Texas</option>
                        <option value="FL">Florida</option>
                        <!-- Additional options can be added here -->
                    </select>
                </div>

                <!-- 10. Postal / ZIP Code -->
                <div class="form-group">
                    <label for="zipcode">Postal / ZIP Code</label>
                    <input type="text" id="zipcode" name="zipcode" required placeholder="12345">
                </div>

                <!-- 11. County/District -->
                <div class="form-group">
                    <label for="county">County / District</label>
                    <input type="text" id="county" name="county" required placeholder="Gotham County">
                </div>
            </div>

            <div class="section-title">Identification & Preferences</div>
            <div class="form-grid">
                <!-- 12. National ID / SSN (Last 4) -->
                <div class="form-group">
                    <label for="idNumber">National ID / SSN (Last 4 Digits)</label>
                    <input type="password" id="idNumber" name="idNumber" maxlength="4" required placeholder="••••">
                </div>

                <!-- 13. Political Party Affiliation -->
                <div class="form-group">
                    <label for="party">Political Party Affiliation</label>
                    <select id="party" name="party" required>
                        <option value="" disabled selected>Select an option</option>
                        <option value="partyA">Party A</option>
                        <option value="partyB">Party B</option>
                        <option value="independent">Independent</option>
                        <option value="unaffiliated">Decline to State</option>
                    </select>
                </div>

                <!-- 14. Language Preference -->
                <div class="form-group">
                    <label for="language">Preferred Language for Materials</label>
                    <select id="language" name="language" required>
                        <option value="en" selected>English</option>
                        <option value="es">Spanish</option>
                        <option value="fr">French</option>
                        <option value="zh">Chinese</option>
                    </select>
                </div>

                <!-- 15. Declaration Checklist -->
                <div class="form-group">
                    <label>Eligibility Declaration</label>
                    <div class="checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="eligibility" name="eligibility" required> 
                            I certify that I am a citizen and meet all legal voting criteria.
                        </label>
                    </div>
                </div>

                <!-- Submit Button -->
                <div class="btn-container">
                    <button type="submit">Submit Registration</button>
                </div>
            </div>

        </form>
    </div>

</body>
</html>
